name: monitor-leiloes

on:
  schedule:
    # 12h e 18h no horário de Brasília
    - cron: "0 12,18 * * *"
      timezone: "America/Sao_Paulo"

  workflow_dispatch:
    inputs:
      dry_run:
        description: "Rodar em modo teste (sem enviar Telegram)?"
        required: false
        default: "false"
        type: choice
        options:
          - "true"
          - "false"

      modo:
        description: "Modo de execução"
        required: false
        default: "diario"
        type: choice
        options:
          - "diario"
          - "backfill"

permissions:
  contents: write

jobs:
  rodar:
    runs-on: ubuntu-latest

    steps:
      - name: Baixar os arquivos do repositório
        uses: actions/checkout@v4

      - name: Preparar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependências
        run: |
          pip install requests beautifulsoup4 playwright
          playwright install --with-deps chromium

      - name: Executar o monitor
        env:
          PYTHONUNBUFFERED: "1"
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          LEILOESBR_EMAIL: ${{ secrets.LEILOESBR_EMAIL }}
          LEILOESBR_SENHA: ${{ secrets.LEILOESBR_SENHA }}
          COLECAO_CSV_URL: ${{ secrets.COLECAO_CSV_URL }}

        run: |
          EXTRA_ARGS=""

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            if [ "${{ inputs.dry_run }}" = "true" ]; then
              EXTRA_ARGS="$EXTRA_ARGS --dry-run"
            fi

            if [ "${{ inputs.modo }}" = "backfill" ]; then
              EXTRA_ARGS="$EXTRA_ARGS --backfill"
            fi
          fi

          python monitor_leiloes.py $EXTRA_ARGS

      - name: Salvar banco de dados e planilha atualizados
        run: |
          git config user.name "monitor-bot"
          git config user.email "monitor-bot@users.noreply.github.com"
          git add leiloes.db leiloes.csv
          git commit -m "Atualização automática de $(date -u +'%Y-%m-%d %H:%M UTC')" || echo "Nada novo para salvar"
          git push
