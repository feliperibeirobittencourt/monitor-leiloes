name: monitor-leiloes

on:
  schedule:
    # 00:00 e 12:00 UTC = 21h e 09h no horário de Brasília
    - cron: "0 0,12 * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Rodar em modo teste (sem enviar Telegram)?"
        required: false
        default: "true"
        type: choice
        options:
          - "true"
          - "false"
      modo:
        description: "Modo de execução"
        required: false
        default: "diario"
        type: choice
        options:
          - "diario"
          - "backfill"

permissions:
  contents: write

jobs:
  rodar:
    runs-on: ubuntu-latest
    steps:
      - name: Baixar os arquivos do repositório
        uses: actions/checkout@v4

      - name: Preparar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependências
        run: pip install requests beautifulsoup4

      - name: Executar o monitor
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          LEILOESBR_EMAIL: ${{ secrets.LEILOESBR_EMAIL }}
          LEILOESBR_SENHA: ${{ secrets.LEILOESBR_SENHA }}
          COLECAO_CSV_URL: ${{ secrets.COLECAO_CSV_URL }}
        run: |
          python monitor_leiloes.py \
            ${{ github.event.inputs.dry_run == 'true' && '--dry-run' || '' }} \
            ${{ github.event.inputs.modo == 'backfill' && '--backfill' || '' }}

      - name: Salvar banco de dados e planilha atualizados
        run: |
          git config user.name "monitor-bot"
          git config user.email "monitor-bot@users.noreply.github.com"
          git add leiloes.db leiloes.csv
          git commit -m "Atualização automática de $(date -u +'%Y-%m-%d %H:%M UTC')" || echo "Nada novo para salvar"
          git push
