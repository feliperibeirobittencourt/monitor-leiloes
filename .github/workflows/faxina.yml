name: faxina-descricoes

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Rodar em modo teste (sem gravar nada)?"
        required: false
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

permissions:
  contents: write

concurrency:
  group: monitor-leiloes-main
  cancel-in-progress: false

jobs:
  rodar:
    runs-on: ubuntu-latest
    steps:
      - name: Baixar os arquivos do repositório
        uses: actions/checkout@v4

      - name: Preparar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependências
        run: pip install requests beautifulsoup4 playwright

      - name: Executar a faxina
        run: |
          python faxina_descricoes.py \
            ${{ github.event.inputs.dry_run == 'true' && '--dry-run' || '' }}

      - name: Salvar banco de dados e planilha atualizados
        if: ${{ github.event.inputs.dry_run == 'false' }}
        run: |
          git config user.name "monitor-bot"
          git config user.email "monitor-bot@users.noreply.github.com"
          git add leiloes.db leiloes.csv
          git commit -m "Faxina: corta descrições gigantes já existentes no banco" || echo "Nada novo para salvar"
          git pull --rebase --autostash origin main
          git push
